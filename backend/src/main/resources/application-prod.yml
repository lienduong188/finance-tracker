spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:finance_tracker}}
    username: ${DATABASE_USERNAME:${PGUSER:postgres}}
    password: ${DATABASE_PASSWORD:${PGPASSWORD:postgres}}
    hikari:
      maximum-pool-size: 5

  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.financetracker: INFO

cors:
  allowed-origins: ${CORS_ORIGINS:*}
