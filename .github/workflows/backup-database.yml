name: Backup Database

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login and download backup
        env:
          API_URL: https://finance-tracker.duonglien.com
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          set -e

          echo "Logging in..."
          LOGIN_RESPONSE=$(curl -sf -X POST "$API_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"login\":\"$ADMIN_USERNAME\",\"password\":\"$ADMIN_PASSWORD\"}")

          ACCESS_TOKEN=$(echo "$LOGIN_RESPONSE" | grep -o '"accessToken":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Login failed: $LOGIN_RESPONSE"
            exit 1
          fi

          echo "Login OK. Downloading backup..."
          BACKUP_FILE="backup_$(date +%Y%m%d_%H%M%S).json"

          HTTP_STATUS=$(curl -sf -o "$BACKUP_FILE" -w "%{http_code}" \
            "$API_URL/api/export/backup" \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Backup download failed with status $HTTP_STATUS"
            exit 1
          fi

          gzip "$BACKUP_FILE"
          BACKUP_GZ="${BACKUP_FILE}.gz"
          echo "BACKUP_FILE=$BACKUP_GZ" >> $GITHUB_ENV
          echo "Backup size: $(du -sh $BACKUP_GZ | cut -f1)"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: backup-${{ github.run_number }}
          name: "Database Backup #${{ github.run_number }}"
          body: |
            Automated database backup (JSON format)
            Date: ${{ github.event.repository.updated_at }}
          files: ${{ env.BACKUP_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-old-backups:
    runs-on: ubuntu-latest
    needs: backup

    steps:
      - name: Delete old backup releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 4
          delete_tag_pattern: backup-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
